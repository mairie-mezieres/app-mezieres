<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MAT — Mézières Avec Toi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#1a3d2b;font-family:'Nunito',system-ui,sans-serif;color:#fff;padding:20px}
.wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.icon{width:72px;height:72px;border-radius:18px;overflow:hidden}
.icon img{width:100%;height:100%}
.msg{font-size:.9rem;opacity:.7;line-height:1.5}
</style>
<script>
(function () {
  var p = new URLSearchParams(location.search);
  var open = p.get('open') || 'notifs';
  var actuId = p.get('actuId');
  var hash;
  if (actuId) {
    hash = '#actu=' + encodeURIComponent(actuId);
  } else if (open === 'meteo') {
    hash = '#meteo';
  } else if (open === 'idees') {
    hash = '#idees';
  } else if (open === 'signalements') {
    hash = '#signalements';
  } else if (open === 'bugs') {
    hash = '#bugs';
  } else if (open === 'contact') {
    hash = '#contact';
  } else {
    hash = '#notifs';
  }
  location.replace('index.html' + hash);
}());
</script>
</head>
<body>
<div class="wrap">
  <div class="icon"><img src="icon-192.png" alt="MAT" width="72" height="72"></div>
  <p class="msg">Ouverture de MAT…</p>
</div>
</body>
</html>
