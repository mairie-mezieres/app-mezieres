name: Veille technologique MAT

on:
  schedule:
    # Tous les lundis à 06h00 UTC (08h00 Paris été / 07h00 hiver)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lancer la veille
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/veille-techno.js
