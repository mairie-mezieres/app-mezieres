name: Veille technologique MAT

on:
  schedule:
    # Tous les lundis à 06h00 UTC (08h00 Paris été / 07h00 hiver)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Veille avec Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Jeton d'abonnement Claude Pro/Max — généré en local avec `claude setup-token`
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Token explicite : évite l'échange OIDC avec la GitHub App Claude
          # (qui exigerait la permission id-token: write et l'installation de l'app)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --allowedTools "WebSearch,WebFetch,Write"
          prompt: |
            Tu es un agent de veille technologique pour MAT (Mézières Avec Toi), une PWA municipale française.

            Stack technique de la PWA :
            - Frontend : PWA vanilla JS hébergée sur GitHub Pages, Service Worker, notifications push web
            - Backend : Node.js / Express hébergé sur Render.com
            - Base de données : Upstash Redis (REST API)
            - IA : Mistral AI (chatbot principal), Claude Haiku (fallback)
            - Cartographie : Leaflet.js + GeoJSON (randonnée, PLU)
            - Intégrations : Trello, Facebook Graph API, Google Calendar, Open-Meteo, Météo-France, IGN Apicarto, api-adresse.data.gouv.fr, Cloudinary
            - CI/CD : GitHub Actions, tests Playwright, monitoring Sentry, EcoIndex, Lighthouse
            Contexte : portail citoyen d'une commune rurale française de moins de 1 000 habitants, audience majoritairement séniors, exigences fortes d'accessibilité et de souveraineté numérique.

            Effectue des recherches web récentes (moins de 30 jours si possible) et rédige un rapport de veille en français, structuré ainsi :

            ## 1. Mises à jour du stack
            Nouvelles versions, breaking changes, failles de sécurité ou dépréciations concernant : Leaflet.js, Node.js/Express, Upstash Redis, Render, GitHub Pages/Actions, API Mistral, API Anthropic, Service Workers / PWA (Chrome, Safari iOS), Playwright, Sentry.

            ## 2. Innovations civic-tech et communes
            Nouvelles fonctionnalités vues dans d'autres applications de communes françaises ou portails citoyens (France ou Europe) qui pourraient inspirer une commune rurale : participation citoyenne, accessibilité séniors, IA souveraine, signalements, etc.

            ## 3. Accessibilité et séniors
            Évolutions des bonnes pratiques, RGAA, outils ou patterns UX pertinents pour un public âgé.

            ## 4. Recommandations actionnables
            3 à 5 actions concrètes, priorisées (haute / moyenne / basse), avec effort estimé.

            Règles de contenu : cite tes sources (liens cliquables), reste factuel, ne mentionne que des informations vérifiées par recherche web. Si une section n'a rien de nouveau cette semaine, indique-le brièvement.

            IMPORTANT — mise en forme du livrable :
            Écris le rapport directement dans un fichier `rapport-veille.html` (et nulle part ailleurs) sous forme d'un document HTML complet et autonome, optimisé pour la lecture dans un client email (Gmail, Outlook, Mail iOS). Contraintes :
            - Document HTML complet : `<!DOCTYPE html>`, `<html lang="fr">`, `<head>` avec `<meta charset="utf-8">`, et tout le contenu dans `<body>`.
            - Tous les styles en CSS INLINE (attribut `style="..."` sur chaque balise) — pas de balise `<style>` ni de CSS externe, car de nombreux clients email les ignorent.
            - Contenu centré dans un conteneur de largeur maximale 640px.
            - Lisibilité séniors : police sans-serif, taille de base 16px minimum, titres bien contrastés, interligne aéré (line-height 1.6), liens soulignés et de couleur foncée distincte.
            - Un en-tête avec le titre « Veille technologique MAT » et la date du jour en français.
            - Les 4 sections avec des titres clairs (`<h2>`), listes à puces lisibles, et une pastille de priorité (haute/moyenne/basse) bien visible dans la section recommandations.
            - Terminer par un pied de page discret : « Rapport généré automatiquement par l'agent de veille (GitHub Actions + Claude Code avec recherche web). »
            N'utilise que l'outil Write pour créer ce fichier. Ne crée aucune issue, ne fais aucun commit.

      - name: Envoyer le rapport par email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.VEILLE_EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.VEILLE_EMAIL_FROM }}
        run: node scripts/send-veille-email.js
