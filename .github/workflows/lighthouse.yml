name: Lighthouse

# Audit Lighthouse de la PWA sur le site en production (mezieres-lez-clery.fr).
# Tourne sur l'infra GitHub (Chrome headless + accès réseau) :
#   - manuellement (bouton "Run workflow")
#   - automatiquement chaque lundi matin (cron)
# ?_lh=1 bypass l'onboarding pour que Lighthouse mesure l'app réelle.
# Après l'audit : data/ecoindex.json est commité sur main (badge footer PWA)
# et un commentaire est posté sur l'issue #190 (suivi mobile GitHub).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # tous les lundis à 06:00 UTC

permissions:
  contents: write
  issues: write

jobs:
  lighthouse:
    name: Audit PWA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://mezieres-lez-clery.fr/?_lh=1
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Installer Node.js pour eco-index
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Calculer l'Eco-index et mettre à jour data/ecoindex.json
        run: node scripts/compute-ecoindex.js
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Publier le rapport Eco-index
        uses: actions/upload-artifact@v7
        with:
          name: rapport-ecoindex
          path: rapport-ecoindex.md
          if-no-files-found: warn

      - name: Commiter data/ecoindex.json sur main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ecoindex.json
          git diff --cached --quiet && echo "Aucun changement" && exit 0
          git commit -m "chore(ci): mise à jour eco-index $(date +%Y-%m-%d) [skip ci]"
          # ecoindex.json est un fichier GÉNÉRÉ : si main a bougé pendant l'audit,
          # la version fraîchement calculée doit gagner. Pendant un rebase,
          # -X theirs = le commit qu'on applique (le nôtre). Sans ça, le push
          # conflicte dès qu'un merge et un audit se croisent (vu le 10/07/2026).
          git pull --rebase -X theirs origin main
          git push

      - name: Mettre à jour l'issue de suivi #190
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ECO=$(jq .ecoindex data/ecoindex.json)
          GRADE=$(jq -r .grade data/ecoindex.json)
          PERF=$(jq .performance data/ecoindex.json)
          ACC=$(jq .accessibility data/ecoindex.json)
          SEO=$(jq .seo data/ecoindex.json)
          BP=$(jq .bestPractices data/ecoindex.json)
          DATE=$(jq -r .date data/ecoindex.json)
          gh issue comment 190 \
            --repo "${{ github.repository }}" \
            --body "**Audit du $DATE**

          | Métrique | Score |
          |---|---|
          | 🚀 Performance | $PERF/100 |
          | ♿ Accessibilité | $ACC/100 |
          | 🔍 SEO | $SEO/100 |
          | ✅ Bonnes pratiques | $BP/100 |
          | 🌿 Eco-index | $ECO/100 — Grade $GRADE |"

      - name: Résumé
        run: echo "Audit Lighthouse + Eco-index terminé"
