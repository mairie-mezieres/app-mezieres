name: EcoIndex

on:
  workflow_dispatch:

  schedule:
    - cron: '15 6 * * 1'

jobs:
  ecoindex:
    name: Sobriété (EcoIndex)
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer GreenIT Analysis
        run: npm install -g github:cnumr/GreenIT-Analysis-cli

      - name: Préparer la liste des URLs
        run: |
          cat > urls.yml <<'EOF'
          - name: Accueil MAT
            url: https://mezieres-lez-clery.fr/
          EOF

      - name: Lancer l'analyse EcoIndex
        run: |
          greenit analyse urls.yml rapport-ecoindex.html --format html --ci
        continue-on-error: true

      - name: Publier le rapport
        uses: actions/upload-artifact@v4
        with:
          name: rapport-ecoindex
          path: rapport-ecoindex.html
          if-no-files-found: warn
