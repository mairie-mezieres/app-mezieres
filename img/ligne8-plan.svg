<svg viewBox="0 0 280 736" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plan ligne 8 Rémi — Orléans ↔ Saint-Laurent-Nouan, liste complète des arrêts">
  <defs>
    <style>
      .com  { font: 700 8px Nunito,Arial,sans-serif; fill: #7a8fa6; letter-spacing:.06em; }
      .stop { font: 600 11.5px Nunito,Arial,sans-serif; fill: #1a2535; }
      .acc  { font: 600 11.5px Nunito,Arial,sans-serif; fill: #1a2535; }
      .ici-stop { font: 700 12px Nunito,Arial,sans-serif; fill: #c0620a; }
      .ici-com  { font: 700 8px Nunito,Arial,sans-serif; fill: #e67e22; letter-spacing:.06em; }
      .sep  { stroke: #dde3ec; stroke-width:1; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="280" height="736" rx="14" fill="#f4f7fb"/>

  <!-- En-tête -->
  <rect x="0" y="0" width="280" height="50" rx="14" fill="#1a6b8a"/>
  <rect x="0" y="38" width="280" height="12" fill="#1a6b8a"/>
  <rect x="10" y="10" width="30" height="28" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="25" y="29" text-anchor="middle" font-size="17" font-weight="900" fill="white" font-family="Arial,sans-serif">8</text>
  <text x="145" y="22" text-anchor="middle" font-size="12" font-weight="800" fill="white" font-family="Nunito,Arial,sans-serif">Ligne 8 — Rémi 45</text>
  <text x="145" y="38" text-anchor="middle" font-size="8.5" fill="#9fd4ec" font-family="Nunito,Arial,sans-serif">Orléans ↔ Saint-Laurent-Nouan</text>

  <!-- Ligne verticale x=40 -->
  <line x1="40" y1="72" x2="40" y2="706" class="sep" stroke="#1a6b8a" stroke-width="4" stroke-linecap="round"/>

  <!-- ══ ORLÉANS ══ -->
  <text x="57" y="68" class="com">ORLÉANS</text>
  <!-- Gare Routière (terminus) -->
  <circle cx="40" cy="80" r="10" fill="#1a6b8a" stroke="white" stroke-width="2"/>
  <polygon points="40,72 44,82 40,79 36,82" fill="white"/>
  <text x="57" y="78" class="stop">Gare Routière</text><text x="218" y="78" font-size="10" fill="#1a6b8a">♿</text>
  <text x="57" y="89" style="font:400 8.5px Nunito,Arial,sans-serif;fill:#8a9bb0">Tram A / B · Cars interurbains</text>
  <!-- Les Turbulences -->
  <circle cx="40" cy="106" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="110" class="stop">Les Turbulences</text>
  <!-- Jardin des Plantes -->
  <circle cx="40" cy="124" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="128" class="stop">Jardin des Plantes</text>
  <!-- Candolle-Charles Péguy -->
  <circle cx="40" cy="142" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="146" class="stop">Candolle-Charles Péguy</text>

  <!-- ══ ST-PRYVÉ-ST-MESMIN ══ -->
  <line x1="57" y1="158" x2="268" y2="158" class="sep"/>
  <text x="57" y="169" class="com">ST-PRYVÉ-ST-MESMIN</text>
  <!-- Quinze Pierres -->
  <circle cx="40" cy="181" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="185" class="stop">Quinze Pierres</text>
  <!-- Place du Marché -->
  <circle cx="40" cy="199" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="203" class="stop">Place du Marché</text>

  <!-- ══ MAREAU-AUX-PRÉS ══ -->
  <line x1="57" y1="215" x2="268" y2="215" class="sep"/>
  <text x="57" y="226" class="com">MAREAU-AUX-PRÉS</text>
  <!-- Église ♿ -->
  <circle cx="40" cy="238" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="242" class="stop">Église</text><text x="94" y="242" font-size="10" fill="#1a6b8a">♿</text>

  <!-- ══ ST-HILAIRE-ST-MESMIN ══ -->
  <line x1="57" y1="254" x2="268" y2="254" class="sep"/>
  <text x="57" y="265" class="com">ST-HILAIRE-ST-MESMIN</text>
  <!-- Cas Rouge -->
  <circle cx="40" cy="277" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="281" class="stop">Cas Rouge</text>

