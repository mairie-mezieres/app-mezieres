  <rect x="24" y="291" width="244" height="60" rx="8" fill="#fff3e0" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="57" y1="293" x2="256" y2="293" stroke="#f8d9a0" stroke-width="1"/>
  <text x="57" y="303" class="ici-com">MÉZIÈRES-LEZ-CLÉRY</text>
  <rect x="198" y="294" width="62" height="12" rx="4" fill="#f39c12"/>
  <text x="229" y="303" text-anchor="middle" font-size="7" font-weight="700" fill="white" font-family="Nunito,Arial,sans-serif">Vous êtes ici ★</text>
  <!-- Le Bréau -->
  <circle cx="40" cy="315" r="7" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="57" y="319" class="ici-stop">Le Bréau</text>
  <!-- Mairie -->
  <circle cx="40" cy="337" r="7" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="57" y="341" class="ici-stop">Mairie</text>

  <!-- ══ CLÉRY-SAINT-ANDRÉ ══ -->
  <line x1="57" y1="358" x2="268" y2="358" class="sep"/>
  <text x="57" y="369" class="com">CLÉRY-SAINT-ANDRÉ</text>
  <!-- Gué du Roi -->
  <circle cx="40" cy="381" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="385" class="stop">Gué du Roi</text>
  <!-- Château d'Eau -->
  <circle cx="40" cy="399" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="403" class="stop">Château d'Eau</text>
  <!-- Mairie -->
  <circle cx="40" cy="417" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="421" class="stop">Mairie</text>
  <!-- Ardoux -->
  <circle cx="40" cy="435" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="439" class="stop">Ardoux</text>

  <!-- ══ DRY ══ -->
  <line x1="57" y1="451" x2="268" y2="451" class="sep"/>
  <text x="57" y="462" class="com">DRY</text>
  <!-- Maison de retraite -->
  <circle cx="40" cy="474" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="478" class="stop">Maison de retraite</text>
  <!-- Mairie ♿ -->
  <circle cx="40" cy="492" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="496" class="stop">Mairie</text><text x="93" y="496" font-size="10" fill="#1a6b8a">♿</text>
  <!-- Rue Francis Carret -->
  <circle cx="40" cy="510" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="514" class="stop">Rue Francis Carret</text>
  <!-- Bel Air -->
  <circle cx="40" cy="528" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="532" class="stop">Bel Air</text>

  <!-- ══ LAILLY-EN-VAL ══ -->
  <line x1="57" y1="544" x2="268" y2="544" class="sep"/>
  <text x="57" y="555" class="com">LAILLY-EN-VAL</text>
  <!-- Porteau -->
  <circle cx="40" cy="567" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="571" class="stop">Porteau</text>
  <!-- Route de Blois ♿ -->
  <circle cx="40" cy="585" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="589" class="stop">Route de Blois</text><text x="160" y="589" font-size="10" fill="#1a6b8a">♿</text>
  <!-- Clos de la Cave -->
  <circle cx="40" cy="603" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="607" class="stop">Clos de la Cave</text>

  <!-- ══ ST-LAURENT-NOUAN ══ -->
  <line x1="57" y1="619" x2="268" y2="619" class="sep"/>
  <text x="57" y="630" class="com">ST-LAURENT-NOUAN</text>
  <!-- La Boulaie -->
  <circle cx="40" cy="642" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="646" class="stop">La Boulaie</text>
  <!-- Le Bois Roger -->
  <circle cx="40" cy="660" r="5.5" fill="white" stroke="#1a6b8a" stroke-width="2.5"/>
  <text x="57" y="664" class="stop">Le Bois Roger</text>
  <!-- Le Verger (terminus) -->
  <circle cx="40" cy="678" r="10" fill="#1a6b8a" stroke="white" stroke-width="2"/>
  <polygon points="40,686 44,676 40,679 36,676" fill="white"/>
  <text x="57" y="674" class="stop" style="fill:#1a6b8a;font-weight:800">Le Verger</text>
  <text x="57" y="686" style="font:400 8.5px Nunito,Arial,sans-serif;fill:#8a9bb0">Terminus · direction Blois</text>

  <!-- Note bas -->
  <text x="140" y="723" text-anchor="middle" font-size="8" fill="#aab" font-family="Nunito,Arial,sans-serif">♿ Arrêt accessible aux personnes à mobilité réduite</text>
  <text x="140" y="733" text-anchor="middle" font-size="8" fill="#f39c12" font-family="Nunito,Arial,sans-serif">★ Arrêts dans Mézières-lez-Cléry</text>
</svg>
