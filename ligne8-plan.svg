<svg viewBox="0 0 280 404" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plan ligne 8 Rémi — Saint-Laurent-Nouan ↔ Orléans">
  <defs>
    <style>
      .stop-name { font: 700 12.5px Nunito, Arial, sans-serif; fill: #1a2535; }
      .stop-sub  { font: 400 9px Nunito, Arial, sans-serif;  fill: #8a9bb0; }
      .term-name { font: 800 13px Nunito, Arial, sans-serif; fill: #1a6b8a; }
      .term-sub  { font: 400 9px Nunito, Arial, sans-serif;  fill: #8a9bb0; }
      .ici-name  { font: 800 13px Nunito, Arial, sans-serif; fill: #c0620a; }
      .ici-sub   { font: 600 9px Nunito, Arial, sans-serif;  fill: #d4813a; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="280" height="404" rx="14" fill="#f4f7fb"/>

  <!-- En-tête -->
  <rect x="0" y="0" width="280" height="48" rx="14" fill="#1a6b8a"/>
  <rect x="0" y="36" width="280" height="12" fill="#1a6b8a"/>
  <rect x="10" y="10" width="32" height="28" rx="6" fill="white" fill-opacity="0.2"/>
  <text x="26" y="29" text-anchor="middle" font="900 17px Arial" font-size="17" font-weight="900" fill="white">8</text>
  <text x="136" y="22" text-anchor="middle" font-size="12" font-weight="800" fill="white" font-family="Nunito,Arial,sans-serif">Ligne 8 — Rémi 45</text>
  <text x="136" y="38" text-anchor="middle" font-size="9" fill="#9fd4ec" font-family="Nunito,Arial,sans-serif">Orléans ↔ Saint-Laurent-Nouan</text>

  <!-- Colonne verticale : trait de ligne -->
  <line x1="56" y1="72" x2="56" y2="372" stroke="#1a6b8a" stroke-width="5" stroke-linecap="round"/>

  <!-- ── ORLÉANS (terminus) ── y=72 -->
  <circle cx="56" cy="72" r="12" fill="#1a6b8a" stroke="white" stroke-width="2.5"/>
  <polygon points="56,64 60,74 56,71 52,74" fill="white"/>
  <text x="78" y="68" class="term-name">Orléans</text>
  <text x="78" y="80" class="term-sub">Gare routière · Tram A / B</text>

  <!-- ── CLÉRY-SAINT-ANDRÉ ── y=138 -->
  <circle cx="56" cy="138" r="8" fill="white" stroke="#1a6b8a" stroke-width="3"/>
  <text x="74" y="134" class="stop-name">Cléry-Saint-André</text>
  <text x="74" y="146" class="stop-sub">Abbatiale · Centre</text>

  <!-- ── MÉZIÈRES-LEZ-CLÉRY (ici) ── y=204 -->
  <rect x="30" y="188" width="220" height="50" rx="8" fill="#fff3e0" stroke="#f39c12" stroke-width="1.5"/>
  <circle cx="56" cy="213" r="11" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="56" y="217" text-anchor="middle" font-size="11" font-weight="900" fill="white" font-family="Arial,sans-serif">★</text>
  <text x="76" y="202" class="ici-name">Mézières-lez-Cléry</text>
  <text x="76" y="214" class="ici-sub">Arrêts : Mairie · Le Bréau</text>

  <!-- ── MEUNG-SUR-LOIRE ── y=286 -->
  <circle cx="56" cy="286" r="8" fill="white" stroke="#1a6b8a" stroke-width="3"/>
  <text x="74" y="282" class="stop-name">Meung-sur-Loire</text>
  <text x="74" y="294" class="stop-sub">Centre · Gare SNCF</text>

  <!-- ── BEAUGENCY ── y=334 -->
  <circle cx="56" cy="334" r="8" fill="white" stroke="#1a6b8a" stroke-width="3"/>
  <text x="74" y="330" class="stop-name">Beaugency</text>
  <text x="74" y="342" class="stop-sub">Gare routière</text>

  <!-- ── SAINT-LAURENT-NOUAN (terminus) ── y=372 -->
  <circle cx="56" cy="372" r="12" fill="#1a6b8a" stroke="white" stroke-width="2.5"/>
  <polygon points="56,380 60,370 56,373 52,370" fill="white"/>
  <text x="78" y="368" class="term-name">Saint-Laurent-Nouan</text>
  <text x="78" y="380" class="term-sub">Terminus · direction Blois</text>

  <!-- Badge "Vous êtes ici" sous le nom -->
  <rect x="76" y="218" width="68" height="13" rx="5" fill="#f39c12"/>
  <text x="110" y="228" text-anchor="middle" font-size="7.5" font-weight="700" fill="white" font-family="Nunito,Arial,sans-serif">Vous êtes ici</text>

  <!-- Note bas -->
  <text x="140" y="399" text-anchor="middle" font-size="8" fill="#aab" font-family="Nunito,Arial,sans-serif">★ Arrêts desservis dans Mézières-lez-Cléry</text>
</svg>
