<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT — Administration</title>
<link rel="manifest" href="manifest-admin.webmanifest">
<meta name="theme-color" content="#1a3d2b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAT Admin">
<link rel="apple-touch-icon" href="icon-admin.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --forest:#1a3d2b;--leaf:#2d6a4f;--sage:#52b788;--mist:#d8f3dc;
  --gold:#d4a843;--amber:#f4a261;--cream:#faf7f2;--warm:#f4f0ea;
  --card:#fff;--text:#1c2b1f;--muted:#5a7065;--border:rgba(0,0,0,0.08);
  --red:#dc2626;--orange:#d97706;--blue:#2563eb;--purple:#7c3aed;
  --shadow:0 2px 12px rgba(26,61,43,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--warm);color:var(--text);min-height:100vh;}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,var(--forest),var(--leaf));}
.login-box{background:white;border-radius:20px;padding:36px 32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;}
.login-logo{font-size:2.5rem;margin-bottom:8px;}
.login-title{font-size:1.2rem;font-weight:900;color:var(--forest);margin-bottom:4px;}
.login-sub{font-size:0.78rem;color:var(--muted);margin-bottom:24px;}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:0.9rem;outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--sage);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--forest),var(--leaf));color:white;border:none;border-radius:10px;padding:12px;font-size:0.9rem;font-weight:800;cursor:pointer;}
.login-err{color:var(--red);font-size:0.78rem;margin-top:8px;display:none;}
#admin-screen{display:none;min-height:100vh;}
.admin-header{background:linear-gradient(135deg,var(--forest),var(--leaf));padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.admin-header-title{font-size:1rem;font-weight:900;color:var(--cream);}
.admin-header-sub{font-size:0.7rem;color:rgba(255,255,255,0.6);}
.logout-btn{background:rgba(255,255,255,0.15);border:none;color:white;border-radius:8px;padding:6px 12px;font-size:0.76rem;font-weight:700;cursor:pointer;}
.admin-nav{background:white;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 16px;}
.nav-tab{padding:16px 20px;font-size:0.82rem;font-weight:800;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.nav-tab.on{color:var(--forest);border-bottom-color:var(--forest);}
.admin-body{padding:20px;max-width:1200px;margin:0 auto;}
.section-title{font-size:0.7rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin:20px 0 12px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat-card-ico{font-size:1.4rem;margin-bottom:6px;}
.stat-card-val{font-size:1.6rem;font-weight:900;color:var(--text);line-height:1;}
.stat-card-label{font-size:0.68rem;color:var(--muted);margin-top:4px;font-weight:600;}
.stat-card-sub{font-size:0.62rem;color:var(--muted);margin-top:3px;}
.stat-card.ok .stat-card-val{color:var(--leaf);}
.stat-card.warn .stat-card-val{color:var(--orange);}
.stat-card.danger .stat-card-val{color:var(--red);}
/* Tendances */
.trend-up{color:#16a34a;font-weight:800;}
.trend-down{color:#dc2626;font-weight:800;}
.trend-flat{color:var(--muted);font-weight:800;}
/* Breakdown appareils */
.device-block{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;}
.device-period-tabs,.device-dim-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.dtab{background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:5px 11px;font-size:0.7rem;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.dtab.on{background:var(--forest);color:white;border-color:var(--forest);}
.device-bars{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.dbar-row{display:flex;align-items:center;gap:8px;}
.dbar-lbl{font-size:0.72rem;color:var(--text);font-weight:600;width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbar-track{flex:1;height:9px;background:var(--mist);border-radius:999px;overflow:hidden;}
.dbar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--sage),var(--leaf));transition:width .5s;}
.dbar-cnt{font-size:0.68rem;font-weight:800;color:var(--muted);width:52px;text-align:right;flex-shrink:0;}
.device-empty{font-size:0.76rem;color:var(--muted);text-align:center;padding:18px 0;font-style:italic;}
/* Progress */
.progress-wrap{background:white;border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:12px;}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-label{font-size:0.8rem;font-weight:800;color:var(--text);}
.progress-val{font-size:0.8rem;font-weight:900;color:var(--muted);}
.progress-bar{height:10px;background:var(--mist);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;transition:width .5s;}
.progress-fill.ok{background:linear-gradient(90deg,var(--sage),var(--leaf));}
.progress-fill.warn{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.progress-fill.danger{background:linear-gradient(90deg,#f87171,var(--red));}
/* Charts */
.chart-wrap{background:white;border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:12px;}
.chart-title{font-size:0.82rem;font-weight:900;color:var(--text);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.chart-period-btn{background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:0.7rem;font-weight:700;color:var(--muted);cursor:pointer;}
.chart-period-btn.on{background:var(--forest);color:white;border-color:var(--forest);}
canvas{max-height:280px;}
/* Tables */
.table-wrap{background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px;}
.table-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--warm);}
.table-title{font-size:0.82rem;font-weight:900;color:var(--text);}
table{width:100%;border-collapse:collapse;font-size:0.78rem;}
th{background:var(--warm);padding:8px 12px;text-align:left;font-weight:800;color:var(--muted);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;}
td{padding:8px 12px;border-top:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:hover td{background:#f9fafb;}
.del-btn{background:none;border:1.5px solid #fca5a5;color:var(--red);border-radius:8px;padding:4px 10px;font-size:0.72rem;font-weight:800;cursor:pointer;}
.del-btn:hover{background:#fee2e2;}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:0.65rem;font-weight:800;}
.badge-green{background:var(--mist);color:var(--leaf);}
.badge-blue{background:#dbeafe;color:var(--blue);}
.badge-orange{background:#fef3c7;color:var(--orange);}
.badge-red{background:#fee2e2;color:var(--red);}
/* Tabs panels */
.tab-panel{display:none;}
.tab-panel.on{display:block;}
/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:0.84rem;}
.loading-spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--mist);border-top-color:var(--sage);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Formulaire publication */
.pub-form-box{background:white;border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:16px;box-shadow:var(--shadow);}
.pub-form-box h3{font-size:0.9rem;font-weight:900;color:var(--forest);margin-bottom:14px;}
.pub-row{margin-bottom:12px;}
.pub-label{display:block;font-size:0.76rem;font-weight:800;color:var(--muted);margin-bottom:4px;}
.pub-required{color:var(--red);}
.pub-input,.pub-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:0.84rem;outline:none;font-family:inherit;background:white;color:var(--text);}
.pub-input:focus,.pub-textarea:focus{border-color:var(--sage);}
.pub-textarea{resize:vertical;min-height:120px;line-height:1.55;}
.pub-char-count{font-size:0.68rem;color:var(--muted);text-align:right;margin-top:2px;}
.pub-char-count.warn{color:var(--red);font-weight:800;}
.pub-hint{font-size:0.68rem;color:var(--muted);margin-top:3px;line-height:1.5;}
.pub-image-zone{border:2px dashed var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .15s;}
.pub-image-zone:hover{border-color:var(--sage);background:#f0fdf4;}
.pub-image-zone.has-image{padding:0;border-style:solid;border-color:var(--sage);}
.pub-image-preview{max-width:100%;max-height:250px;display:block;border-radius:8px;margin:0 auto;}
.pub-image-remove{margin-top:8px;background:#fee2e2;color:var(--red);border:none;border-radius:8px;padding:6px 12px;font-weight:800;font-size:0.72rem;cursor:pointer;}
.pub-options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;}
.pub-checkbox-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--warm);border-radius:10px;cursor:pointer;user-select:none;}
.pub-checkbox-row input{width:18px;height:18px;cursor:pointer;flex-shrink:0;}
.pub-checkbox-row span{font-size:0.76rem;font-weight:700;color:var(--text);}
.pub-publish-btn{width:100%;background:linear-gradient(135deg,var(--forest),var(--leaf));color:white;border:none;border-radius:12px;padding:13px;font-size:0.9rem;font-weight:900;cursor:pointer;margin-top:4px;}
.pub-publish-btn:disabled{opacity:0.5;cursor:wait;}
.pub-preview{background:var(--warm);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:12px;}
.pub-preview-label{font-size:0.62rem;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;}
.pub-preview-title{font-size:0.95rem;font-weight:900;color:var(--forest);margin-bottom:5px;line-height:1.4;}
.pub-preview-event{font-size:0.72rem;color:var(--leaf);font-weight:800;background:var(--mist);padding:5px 10px;border-radius:8px;margin:6px 0;display:inline-block;}
.pub-preview-desc{font-size:0.78rem;color:var(--text);line-height:1.55;white-space:pre-wrap;}
.pub-calendar-warn{background:#fef3c7;border:1px solid #fcd34d;color:#92400e;padding:9px 12px;border-radius:10px;font-size:0.74rem;font-weight:700;margin-top:8px;}
.pub-status{margin-top:10px;padding:12px 14px;border-radius:10px;font-size:0.78rem;font-weight:700;line-height:1.7;}
.pub-status.success{background:#dcfce7;color:#166534;}
.pub-status.error{background:#fee2e2;color:#991b1b;}
.pub-status.warn{background:#fef3c7;color:#92400e;}
@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr 1fr;}
  .admin-body{padding:12px;}
  .dbar-lbl{width:100px;}
}
</style>
</head>
<body>

<!-- ── Bannière install admin ── -->
<div id="admin-install-banner" style="display:none;background:linear-gradient(135deg,#1a3d2b,#2d6a4f);padding:12px 16px;align-items:center;gap:10px;position:fixed;bottom:0;left:0;right:0;z-index:999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);">
  <div style="width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🔐</div>
  <div style="flex:1"><div style="font-size:0.8rem;font-weight:900;color:white">Installer MAT Admin</div><div style="font-size:0.65rem;color:rgba(255,255,255,0.7)">Accès rapide au tableau de bord</div></div>
  <button onclick="installAdmin()" style="background:var(--gold);color:#3d2000;border:none;border-radius:10px;padding:8px 14px;font-size:0.76rem;font-weight:900;cursor:pointer;flex-shrink:0">Installer</button>
  <button onclick="document.getElementById('admin-install-banner').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:1rem;cursor:pointer;padding:4px;flex-shrink:0">✕</button>
</div>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌲</div>
    <div class="login-title">MAT — Administration</div>
    <div class="login-sub">Mézières-lez-Cléry · Accès restreint</div>
    <input class="login-input" type="password" id="pwd-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Accéder au tableau de bord</button>
    <div class="login-err" id="login-err">Mot de passe incorrect.</div>
  </div>
</div>

<!-- ── ADMIN ── -->
<div id="admin-screen">
  <div class="admin-header">
    <div>
      <div class="admin-header-title">🌲 MAT — Tableau de bord</div>
      <div class="admin-header-sub">Mézières-lez-Cléry · <span id="last-refresh">—</span></div>
    </div>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <div class="admin-nav">
    <button class="nav-tab on" onclick="showTab('overview',this)">📊 Vue générale</button>
    <button class="nav-tab" onclick="showTab('actus',this)">🔔 Actualités</button>
    <button class="nav-tab" onclick="showTab('banner',this)">📢 Info/Alerte</button>
    <button class="nav-tab" onclick="showTab('app',this)">📱 Usage app</button>
    <button class="nav-tab" onclick="showTab('ia',this)">🤖 IA</button>
    <button class="nav-tab" onclick="showTab('redis',this)">🗄️ Redis</button>
    <button class="nav-tab" onclick="showTab('ideas',this)">💡 Idées</button>
    <button class="nav-tab" onclick="showTab('signals',this)">🚨 Signalements</button>
    <button class="nav-tab" onclick="showTab('purge',this)">🗑️ Purge</button>
  </div>

  <div class="admin-body">
    <div class="tab-panel on" id="tab-overview"><div id="overview-content"><div class="loading"><div class="loading-spinner"></div><br>Chargement…</div></div></div>
    <div class="tab-panel" id="tab-ia"><div id="ia-content"><div class="loading"><div class="loading-spinner"></div><br>Chargement…</div></div></div>
    <div class="tab-panel" id="tab-redis"><div id="redis-content"><div class="loading"><div class="loading-spinner"></div><br>Chargement…</div></div></div>
    <div class="tab-panel" id="tab-app"><div id="app-content"><div class="loading"><div class="loading-spinner"></div><br>Chargement…</div></div></div>
    <div class="tab-panel" id="tab-ideas"><div id="ideas-content"><div class="loading"><div class="loading-spinner"></div><br>Chargement…</div></div></div>
    <div class="tab-panel" id="tab-actus"><div id="actus-content"><div class="loading"><div class="loading-spinner"></div><br>Chargement…</div></div></div>
    <div class="tab-panel" id="tab-signals"><div id="signals-content"><div class="loading"><div class="loading-spinner"></div><br>Chargement…</div></div></div>
    <div class="tab-panel" id="tab-banner"><div id="banner-content"></div></div>
    <div class="tab-panel" id="tab-purge"><div id="purge-content"></div></div>
  </div>
</div>

<script>
const API = 'https://chatbot-mairie-mezieres.onrender.com';
let TOKEN = localStorage.getItem('mat_admin_token') || '';
let _data = null;
let _charts = {};
let _purgeDateValue = new Date().toISOString().slice(0, 10);

// ── Auth ──────────────────────────────
async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  try {
    const r = await fetch(`${API}/admin/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
    const d = await r.json();
    if (d.ok) { TOKEN = d.token; localStorage.setItem('mat_admin_token',TOKEN); showAdmin(); }
    else { document.getElementById('login-err').style.display='block'; }
  } catch(e) { document.getElementById('login-err').textContent='Erreur de connexion au serveur.'; document.getElementById('login-err').style.display='block'; }
}
function logout() { localStorage.removeItem('mat_admin_token'); TOKEN=''; document.getElementById('admin-screen').style.display='none'; document.getElementById('login-screen').style.display='flex'; }
async function showAdmin() { document.getElementById('login-screen').style.display='none'; document.getElementById('admin-screen').style.display='block'; await loadAll(); }
async function apiGet(path) { const r=await fetch(`${API}${path}`,{headers:{'x-admin-token':TOKEN}}); if(r.status===401){logout();throw new Error('Non autorisé');} return r.json(); }
async function apiDelete(path) { const r=await fetch(`${API}${path}`,{method:'DELETE',headers:{'x-admin-token':TOKEN}}); return r.json(); }

function renderAll() { renderOverview(); renderIa(); renderRedis(); renderApp(); renderIdeas(); renderActus(); renderSignals(); renderBanner(); renderPurge(); }

// ── Helpers généraux ──────────────────
function fmt(n) { return (n||0).toLocaleString('fr-FR'); }
function fmtEurBig(n) { return '€'+(n||0).toFixed(2); }
function fmtBytes(b) { if(!b)return'—'; if(b>1024*1024)return(b/1024/1024).toFixed(1)+' Mo'; if(b>1024)return(b/1024).toFixed(0)+' Ko'; return b+' o'; }
function progressClass(p) { return p>=80?'danger':p>=60?'warn':'ok'; }
function topEntries(obj,limit=10) { return Object.entries(obj||{}).sort((a,b)=>(b[1]||0)-(a[1]||0)).slice(0,limit); }
function sumValues(obj) { return Object.values(obj||{}).reduce((a,b)=>a+Number(b||0),0); }
function pctTrend(cur,prev) { if(!prev)return cur>0?'+100%':'—'; const p=((cur-prev)/prev)*100; return`${p>0?'+':''}${p.toFixed(0)}%`; }
function trendCls(cur,prev) { const d=cur-prev; return d>0?'trend-up':d<0?'trend-down':'trend-flat'; }
function trendArrow(cur,prev) { const d=cur-prev; return d>0?'↗':d<0?'↘':'→'; }

// ══════════════════════════════════════════════════════════════
// BREAKDOWN APPAREILS
// Lit _data.dash.app.devices.{today|month}.{types|os|browsers|pwa|appVersions}
// ══════════════════════════════════════════════════════════════
let _dvPeriod = 'month';
let _dvDim    = 'types';

const DIM_LABELS = {
  types:       '📱 Type appareil',
  os:          '💻 Système OS',
  browsers:    '🌐 Navigateur',
  pwa:         '📲 Mode accès',
  appVersions: '🔢 Version MAT'
};
const ITEM_ICONS = {
  'iPhone':'🍎','iPad':'📱','Android Mobile':'🤖','Android Tablet':'📊','Desktop':'🖥️',
  'iOS':'🍎','iPadOS':'📱','Android':'🤖','Windows':'🪟','macOS':'🍎','Linux':'🐧',
  'Chrome':'🌐','Safari':'🧭','Firefox':'🦊','Edge':'🔷','Chrome iOS':'🌐','Firefox iOS':'🦊','Edge Android':'🔷',
  'Oui (installée)':'📲','Non (navigateur)':'🌐',
};

function renderDeviceBreakdown(wrapId) {
  const el = document.getElementById(wrapId);
  if (!el) return;
  const devices = _data?.dash?.app?.devices || {};
  const src = _dvPeriod === 'today' ? devices.today : devices.month;

  const periodTabs = Object.entries({today:"Aujourd'hui", month:"Ce mois"}).map(([k,lbl]) =>
    `<button class="dtab${_dvPeriod===k?' on':''}" onclick="setDvPeriod('${k}')">${lbl}</button>`
  ).join('');

  const dimTabs = Object.entries(DIM_LABELS).map(([k,lbl]) =>
    `<button class="dtab${_dvDim===k?' on':''}" onclick="setDvDim('${k}')">${lbl}</button>`
  ).join('');

  const data = (src || {})[_dvDim] || {};
  const entries = Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0, 10);
  const total = entries.reduce((s,[,v])=>s+v, 0);

  let barsHtml;
  if (!entries.length || total === 0) {
    barsHtml = `<div class="device-empty">Aucune donnée pour cette période.<br><small style="color:var(--muted)">Les données s'accumulent à chaque ouverture de l'app.</small></div>`;
  } else {
    const maxV = entries[0][1] || 1;
    barsHtml = `<div class="device-bars">` + entries.map(([lbl, cnt]) => {
      const pct   = Math.round(cnt / maxV * 100);
      const share = Math.round(cnt / total * 100);
      const ico   = ITEM_ICONS[lbl] || '';
      return `<div class="dbar-row">
        <div class="dbar-lbl" title="${lbl}">${ico ? ico+' ' : ''}${lbl}</div>
        <div class="dbar-track"><div class="dbar-fill" style="width:${pct}%"></div></div>
        <div class="dbar-cnt">${cnt} <span style="font-size:0.58rem;font-weight:400;color:var(--muted)">(${share}%)</span></div>
      </div>`;
    }).join('') + `</div>

function buildCategorySeries(source, limitPeriods=12, topCatsCount=5) {
  const periods = Object.keys(source||{}).sort().slice(-limitPeriods);
  const totals = {};
  for (const period of periods) { const cats=source[period]||{}; for (const [cat,val] of Object.entries(cats)) totals[cat]=(totals[cat]||0)+Number(val||0); }
  const topCats = Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,topCatsCount).map(([c])=>c);
  const palette = ['#2563eb','#16a34a','#f59e0b','#7c3aed','#dc2626','#0891b2'];
  const datasets = topCats.map((cat,i)=>({ label:cat, data:periods.map(p=>Number((source[p]||{})[cat]||0)), color:palette[i%palette.length] }));
  return { labels:periods, periods, datasets, topCats };
}

      let txt=`📅 ${JOURS[d.getDay()]} ${d.getDate()} ${MOIS[d.getMonth()]} ${d.getFullYear()}`;
      if(d.getHours()||d.getMinutes())txt+=` à ${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
      if(eventLoc)txt+=` · 📍 ${eventLoc}`;
      ev.textContent=txt; ev.style.display='inline-block';

}

function pubHandleImage(e) {
  const file=e.target.files[0]; if(!file)return;
  if(file.size>5*1024*1024){alert("Image trop lourde (max 5 Mo)");return;}
  const reader=new FileReader();
  reader.onload=()=>{
    _pubImageBase64=reader.result;
    document.getElementById('pub-image-preview').src=reader.result;
    document.getElementById('pub-image-preview').style.display='block';
    document.getElementById('pub-image-empty').style.display='none';
    document.getElementById('pub-image-zone').classList.add('has-image');
    document.getElementById('pub-image-remove-btn').style.display='inline-block';
  };

}

async function pubCheckDuplicates() {
  const eventDate=document.getElementById('pub-event-date')?.value;
  const warn=document.getElementById('pub-calendar-warn'); if(!warn)return;
  if(!eventDate){warn.style.display='none';return;}
  try {
    const r=await fetch(`${API}/admin/calendar/day?date=${eventDate.slice(0,10)}`,{headers:{'x-admin-token':TOKEN}});
    const d=await r.json();
    if(d.ok&&d.events&&d.events.length>0){
      const names=d.events.map(e=>`"${e.summary}"`).join(', ');
      document.getElementById('pub-calendar-warn-text').textContent=`${d.events.length} événement(s) déjà ce jour : ${names}. Si le titre est similaire (> 60%), il sera automatiquement remplacé.`;
      warn.style.display='block';
    } else { warn.style.display='none'; }
  } catch(e){ warn.style.display='none'; }
}

async function pubSubmit() {
  const title        =(document.getElementById('pub-title')?.value||'').trim();
  const description  =(document.getElementById('pub-desc')?.value||'').trim();
  const eventDate    = document.getElementById('pub-event-date')?.value||'';
  const eventLocation=(document.getElementById('pub-event-location')?.value||'').trim();
  const publishFacebook=document.getElementById('pub-opt-fb')?.checked||false;
  const sendPush       =document.getElementById('pub-opt-push')?.checked||false;
  const createCalendar =(document.getElementById('pub-opt-calendar')?.checked||false)&&!!eventDate;

  if(!title){alert("Le titre est obligatoire");return;}
  if(!description){alert("La description est obligatoire");return;}

  const status=document.getElementById('pub-status');
  const btn=document.getElementById('pub-submit');
  btn.disabled=true; btn.textContent='⏳ Publication en cours…'; status.style.display='none';

  try {
    const r=await fetch(`${API}/admin/actus/add`,{
      method:'POST', headers:{'Content-Type':'application/json','x-admin-token':TOKEN},
      body:JSON.stringify({title, description, imageBase64:_pubImageBase64, eventDate:eventDate||null, eventLocation:eventLocation||null, publishFacebook, sendPush, createCalendar})
    });
    const d=await r.json();

    if(!r.ok||!d.ok){
      status.className='pub-status error';
      status.innerHTML='❌ Erreur : '+(d.error||'Publication échouée');
      status.style.display='block';
      return;
    }

    // ══ Construction du récapitulatif enrichi ══
    const lines=[];
    lines.push('✅ Actualité publiée avec succès !');

    if(publishFacebook){
      if(d.facebook?.ok){
        const mode=d.facebook.mode==='photo'?'avec photo':'texte seul';
        const fb=d.facebook.fallbackUsed?' <em>(photo non envoyée, fallback texte)</em>':'';
        lines.push(`📘 Facebook — ${mode}${fb}`);
      } else if(d.facebook){
        lines.push(`⚠️ Facebook : ${d.facebook.error||'échec'}`);
      }
    }

    if(sendPush){
      if(d.push?.sent>0) lines.push(`🔔 ${d.push.sent} notification(s) push envoyée(s)`);
      else if(d.push?.total===0) lines.push('⚠️ Push : aucun abonné enregistré');
      else if(d.push) lines.push(`⚠️ Push : ${d.push.sent||0} envoyée(s), ${d.push.failed||0} échec(s)`);
    }

    if(createCalendar){
      if(d.calendar?.ok){
        const replaced=d.calendar.deleted_duplicates||0;
        // ══ Affichage explicite du remplacement ══
        if(replaced>0){
          lines.push(`📅 Google Agenda — ${replaced} événement(s) similaire(s) <strong>remplacé(s)</strong> 🔄`);
        } else {
          lines.push('📅 Google Agenda — événement créé');
        }
        if(d.calendar.html_link){
          lines.push(`&nbsp;&nbsp;└ <a href="${d.calendar.html_link}" target="_blank" style="color:var(--leaf);font-weight:700;">Voir dans l'agenda →</a>`);
        }
      } else if(d.calendar){
        lines.push(`⚠️ Google Agenda : ${d.calendar.error||'échec'}`);
      }
    }

    if(d.warnings&&d.warnings.length){
      for(const w of d.warnings) lines.push(`⚠️ ${w}`);
    }

    const hasWarn=lines.some(l=>l.startsWith('⚠️'));
    status.className=hasWarn?'pub-status warn':'pub-status success';
    status.innerHTML=lines.join('<br>');
    status.style.display='block';

    // Reset
    document.getElementById('pub-title').value='';
    document.getElementById('pub-desc').value='';
    document.getElementById('pub-event-date').value='';
    document.getElementById('pub-event-location').value='';
    pubRemoveImage();
    document.getElementById('pub-calendar-warn').style.display='none';
    pubUpdate();

    setTimeout(async()=>{
      try{ const actus=await apiGet('/admin/actus'); _data.actus=actus.actus||[]; renderActus(); }catch(e){}
    },800);

  } catch(e){
    status.className='pub-status error';
    status.textContent='❌ Erreur réseau : '+e.message;
    status.style.display='block';
  } finally { btn.disabled=false; btn.textContent='📢 Publier'; }
}

function drawWordCloud(canvasId,parJour) {
  const canvas=document.getElementById(canvasId); if(!canvas)return;
  const days=Object.keys(parJour).sort().slice(-30);
  const totals={};
  days.forEach(d=>{Object.entries(parJour[d]||{}).forEach(([cat,val])=>{totals[cat]=(totals[cat]||0)+Number(val||0);});});
  const entries=Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,20);
  if(!entries.length)return;
  const maxVal=entries[0][1]||1, minVal=entries[entries.length-1][1]||1;
  const palette=['#2563eb','#16a34a','#f59e0b','#7c3aed','#dc2626','#0891b2','#b45309','#0f766e'];
  const W=canvas.parentElement?.offsetWidth||480, H=200;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,W,H);
  const placed=[];
  entries.forEach(([cat,val],i)=>{
    const ratio=(val-minVal)/(maxVal-minVal+1), fontSize=Math.round(11+ratio*26);
    ctx.font=`900 ${fontSize}px 'Segoe UI',sans-serif`;
    const color=palette[i%palette.length], w=ctx.measureText(cat).width, h=fontSize;
    let ok=false;
    for(let r=0;r<120&&!ok;r+=2){
      const angle=r*0.4, cx=W/2+r*Math.cos(angle)*1.8, cy=H/2+r*Math.sin(angle)*0.9;
      const x=cx-w/2, y=cy+h/3;
      if(x<2||x+w>W-2||y-h<2||y>H-2)continue;
      const box={x,y:y-h,w,h:h+2};
      const overlap=placed.some(p=>!(box.x>p.x+p.w||box.x+box.w<p.x||box.y>p.y+p.h||box.y+box.h<p.y));
      if(!overlap){ctx.fillStyle=color;ctx.fillText(cat,x,y);placed.push(box);ok=true;}
    }
  });
}

    const controller=new AbortController(); const timer=setTimeout(()=>controller.abort(),15000);
    const dashRes=await fetch(`${API}/admin/dashboard`,{headers:{'x-admin-token':TOKEN},signal:controller.signal});
    if(dashRes.status===401){clearTimeout(timer);logout();return;} if(!dashRes.ok){clearTimeout(timer);throw new Error(`dashboard ${dashRes.status}`);}
    const dash=await dashRes.json();
    const[ideas,actus,signals]=await Promise.all([apiGet('/admin/ideas'),apiGet('/admin/actus'),apiGet('/admin/signals')]);
    clearTimeout(timer);
    _data={dash,ideas:ideas.ideas||[],actus:actus.actus||[],signals:signals.signals||[]};
    document.getElementById('last-refresh').textContent=new Date().toLocaleTimeString('fr-FR');
    renderAll();
  }catch(e){console.warn('loadAll échoué:',e.message);document.getElementById('last-refresh').textContent='⚠️ Erreur — '+new Date().toLocaleTimeString('fr-FR');}
}

init();
setInterval(loadAll, 5*60*1000);

// ── Install PWA Admin ─────────────────
let _dpAdmin=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_dpAdmin=e;if(!localStorage.getItem('mat_admin_installed'))document.getElementById('admin-install-banner').style.display='flex';});
window.addEventListener('appinstalled',()=>{localStorage.setItem('mat_admin_installed','1');document.getElementById('admin-install-banner').style.display='none';});
function installAdmin(){
  if(_dpAdmin){_dpAdmin.prompt();_dpAdmin.userChoice.then(r=>{if(r.outcome==='accepted'){localStorage.setItem('mat_admin_installed','1');document.getElementById('admin-install-banner').style.display='none';}_dpAdmin=null;});}
  else{const m=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);if(m)alert('Pour installer MAT Admin :\n\niPhone/iPad : bouton Partager → "Sur l\'écran d\'accueil"\n\nAndroid : menu navigateur → "Ajouter à l\'écran d\'accueil"');else alert('Pour installer MAT Admin sur PC :\n\nChrome / Edge : cliquez sur l\'icône ⊕ dans la barre d\'adresse');}
}
if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw-admin.js').catch(()=>{});}
</script>
