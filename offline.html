<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mézières Avec Toi — Hors ligne</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',system-ui,sans-serif;background:#f0ebe3;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .card{background:#fff;border-radius:24px;padding:36px 28px;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(26,61,43,.1);border:1px solid #e8f0ea}
  .ico{font-size:3.2rem;margin-bottom:16px}
  h1{font-size:1.3rem;font-weight:900;color:#1a3d2b;margin-bottom:10px;line-height:1.3}
  p{font-size:.88rem;color:#52b788;line-height:1.65;margin-bottom:20px}
  .tips{background:#f0f8f4;border-radius:14px;padding:14px 16px;text-align:left;font-size:.78rem;color:#444;line-height:1.7;margin-bottom:24px}
  .tips strong{color:#1a3d2b;display:block;margin-bottom:4px}
  button{width:100%;background:linear-gradient(135deg,#2d6a4f,#1a3d2b);color:#fff;border:none;border-radius:14px;padding:14px;font-family:inherit;font-size:.9rem;font-weight:800;cursor:pointer;transition:opacity .15s}
  button:hover{opacity:.88}
  .sub{font-size:.72rem;color:#aaa;margin-top:16px}
  img{width:56px;height:56px;border-radius:14px;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto}
</style>
</head>
<body>
<div class="card">
  <img src="icon-192.png" alt="MAT" onerror="this.style.display='none'">
  <div class="ico">📡</div>
  <h1>Pas de connexion</h1>
  <p>Mézières Avec Toi a besoin d'internet pour charger les dernières informations.</p>
  <div class="tips">
    <strong>En attendant…</strong>
    Vérifiez votre connexion Wi-Fi ou données mobiles, puis réessayez.
  </div>
  <button onclick="location.reload()">↺ Réessayer</button>
  <p class="sub">MAT — Mézières-lez-Cléry</p>
</div>
</body>
</html>
